<div class="animals-page">

    <app-animal-filters (searchChange)="onSearch($event)" (dietChange)="onDietChange($event)"
        (continentChange)="onContinentChange($event)" (conservationStatusChange)="onConservationStatusChange($event)"
        (clear)="onClear()" [selectedDiet]="dietFilter" [selectedContinent]="continentFilter"
        [selectedConservationStatus]="conservationStatusFilter">
    </app-animal-filters>

    <app-animal-list [animals]="paginatedAnimals">
    </app-animal-list>

    <app-animal-pagination [totalItems]="filteredAnimals.length" [currentPage]="currentPage" [pageSize]="pageSize"
        (pageChange)="onPageChange($event)"></app-animal-pagination>
</div>
