<div class="content-wrapper">
    <section class="section-header">
        <h1 class="section-title">{{ 'COMING_SOON.TITLE' | translate }}</h1>
    </section>

    <section class="coming-soon">
        <div class="coming-soon__icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="64px" height="64px">
                <path
                    d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z" />
            </svg>
        </div>

        <div class="coming-soon__body">
            <span class="coming-soon__eyebrow">{{ 'HEADER.SITE_TITLE' | translate }}</span>
            <h2 class="coming-soon__title">{{ 'COMING_SOON.TITLE' | translate }}</h2>
            <p class="coming-soon__description">
                {{ 'COMING_SOON.DESCRIPTION' | translate }}
            </p>
            <a class="coming-soon__cta" routerLink="/home" routerLinkActive="active">{{ 'COMING_SOON.BACK_HOME' | translate }}</a>
        </div>
    </section>
</div>
