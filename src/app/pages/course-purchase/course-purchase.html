<div class="content-wrapper">

    <section class="section-header">
        <h1 class="section-title">Inscripción a curso</h1>
    </section>

    <section class="section-form-display">

        <article class="article article-regular-admission">

            @if (selectedCourse) {
            <div class="course-card">
                <h2>{{ selectedCourse.name }}</h2>

                <p>{{ selectedCourse.description }}</p>
                <p>Inicio: {{ selectedCourse.startDate }}</p>
                <p>Precio: {{ getPrice(selectedCourse) }} €</p>

                <button class="button submit-button-guest" (click)="enroll(selectedCourse)">
                    Inscribirse
                </button>
            </div>
            }

        </article>
    </section>

</div>
